<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDD Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Pantalla de login (visible cuando no hay token) -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <h1>SDD Viewer</h1>
      <p>Conéctate con tu cuenta de GitHub para acceder a los specs.</p>
      <button id="login-btn" class="btn-primary">Conectar con GitHub</button>
      <div id="device-flow" class="hidden">
        <p>Ingresa este código en <a id="device-url" href="https://github.com/login/device" target="_blank">github.com/login/device</a>:</p>
        <div class="device-code" id="device-code"></div>
        <p class="hint">Esperando autorización...</p>
      </div>
      <div id="login-error" class="hidden error-msg"></div>
    </div>
  </div>

  <!-- App principal (visible cuando hay token) -->
  <div id="app" class="hidden">
    <nav id="nav">
      <div id="nav-track-info">
        <div id="nav-track-name"></div>
        <div id="nav-track-status"></div>
      </div>
      <ul id="nav-doc-list"></ul>
    </nav>

    <main id="content">
      <div id="doc-body"></div>
    </main>

    <aside id="sidebar">
      <div id="sidebar-header"></div>
      <div id="threads-list"></div>
    </aside>
  </div>

  <script type="module">
    import { Auth }      from './js/auth.js';
    import { Router }    from './js/router.js';
    import { GitHubApi } from './js/github-api.js';
    import { Renderer }  from './js/renderer.js';
    import { Sidebar }   from './js/sidebar.js';

    const REPO_OWNER      = 'jpsaldivar';
    const REPO_NAME       = 'test-sdd';
    const OAUTH_CLIENT_ID = 'Ov23liXe8mcUwGbAIfqb';

    const auth     = new Auth(OAUTH_CLIENT_ID);
    const router   = new Router();
    const api      = new GitHubApi(REPO_OWNER, REPO_NAME, auth);
    const renderer = new Renderer();
    const sidebar  = new Sidebar(api, router);

    async function boot() {
      const token = auth.getToken();
      if (!token) {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('login-btn').addEventListener('click', () => auth.startDeviceFlow());
        return;
      }
      document.getElementById('app').classList.remove('hidden');
      const params = router.getParams();
      if (params.team && params.track) {
        await loadTrack(params);
      } else {
        document.getElementById('doc-body').innerHTML =
          '<p style="padding:40px;color:#888">Abre el viewer con ?team=X&track=Y</p>';
      }
    }

    async function loadTrack({ team, track, doc, section, mission }) {
      document.getElementById('nav-track-name').textContent = track;
      const files = await api.listTrackFiles(team, track, mission);
      renderNav(files, doc);
      const activeDoc = doc || files[0];
      const content = await api.getFileContent(team, track, activeDoc, mission);
      const { html, sections } = renderer.render(content);
      document.getElementById('doc-body').innerHTML = html;
      await sidebar.load(team, track, sections);
      if (section) sidebar.focusSection(section);
    }

    function renderNav(files, activeDoc) {
      const list = document.getElementById('nav-doc-list');
      list.innerHTML = files.map(f => `
        <li class="${f === activeDoc ? 'active' : ''}">
          <a href="#" data-doc="${f}">${f}</a>
        </li>
      `).join('');
      list.querySelectorAll('a').forEach(a =>
        a.addEventListener('click', e => {
          e.preventDefault();
          router.setParam('doc', a.dataset.doc);
          location.reload();
        })
      );
    }

    boot();
  </script>
</body>
</html>
