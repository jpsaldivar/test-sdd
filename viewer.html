<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDD Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Header superior (siempre visible) -->
  <header id="top-header">
    <a class="header-logo" href="viewer.html">
      <div class="header-logo-mark">SDD</div>
      <span class="header-logo-text"><span>SDD</span> Viewer</span>
    </a>
    <div class="header-sep"></div>
    <div class="header-track-info">
      <span class="header-track-name" id="header-track-name"></span>
    </div>
    <div class="header-branch-select">
      <label for="branch-select">Rama</label>
      <select id="branch-select" disabled>
        <option value="">Cargando…</option>
      </select>
    </div>
    <div class="header-sep"></div>
    <div class="header-user">
      <span class="header-user-dot"></span>
      <span id="header-username"></span>
    </div>
    <button class="header-logout" id="logout-btn">Salir</button>
  </header>

  <!-- Login screen -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <h1>SDD Viewer</h1>
      <p>Conéctate con tu cuenta de GitHub para acceder a los specs.</p>
      <button id="login-btn" class="btn-primary">Conectar con GitHub</button>
      <div id="device-flow" class="hidden">
        <p>Ingresa este código en <a id="device-url" href="https://github.com/login/device" target="_blank">github.com/login/device</a>:</p>
        <div class="device-code" id="device-code"></div>
        <p class="hint">Esperando autorización…</p>
      </div>
      <div id="login-error" class="hidden error-msg"></div>
    </div>
  </div>

  <!-- App principal -->
  <div id="app" class="hidden">
    <nav id="nav">
      <div id="nav-track-info">
        <div id="nav-track-name"></div>
        <div id="nav-track-status"></div>
      </div>
      <ul id="nav-doc-list"></ul>
    </nav>

    <main id="content">
      <div id="doc-body"></div>
    </main>

    <aside id="sidebar">
      <div id="sidebar-header"></div>
      <div id="threads-list"></div>
    </aside>
  </div>

  <script type="module">
    import { Auth }      from './js/auth.js';
    import { Router }    from './js/router.js';
    import { GitHubApi } from './js/github-api.js';
    import { Renderer }  from './js/renderer.js';
    import { Sidebar }   from './js/sidebar.js';

    const REPO_OWNER      = 'jpsaldivar';
    const REPO_NAME       = 'test-sdd';
    const OAUTH_CLIENT_ID = 'Ov23liXe8mcUwGbAIfqb';

    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

    const auth     = new Auth(OAUTH_CLIENT_ID);
    const router   = new Router();
    const api      = new GitHubApi(REPO_OWNER, REPO_NAME, auth);
    const renderer = new Renderer();
    const sidebar  = new Sidebar(api, router);

    async function boot() {
      const token = auth.getToken();
      if (!token) {
        document.getElementById('top-header').style.display = 'none';
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('login-btn').addEventListener('click', () => auth.startDeviceFlow());
        return;
      }

      document.getElementById('app').classList.remove('hidden');
      document.getElementById('logout-btn').addEventListener('click', () => auth.logout());

      // Usuario actual
      try {
        const user = await api.getCurrentUser();
        document.getElementById('header-username').textContent = user.login;
      } catch {}

      const params = router.getParams();
      if (params.team && params.track) {
        document.getElementById('header-track-name').textContent =
          `${params.team} / ${params.track}`;
        await loadBranches(params.branch);
        await loadTrack(params);
      } else {
        document.getElementById('doc-body').innerHTML =
          '<p style="padding:40px;color:#888">Abre el viewer con ?team=X&track=Y</p>';
        await loadBranches(params.branch);
      }
    }

    async function loadBranches(activeBranch) {
      const select = document.getElementById('branch-select');
      try {
        const branches = await api.getBranches();
        select.innerHTML = branches
          .map(b => `<option value="${b.name}" ${b.name === activeBranch ? 'selected' : ''}>${b.name}</option>`)
          .join('');
        select.disabled = false;
        select.addEventListener('change', () => {
          router.setParam('branch', select.value);
          location.reload();
        });
      } catch {
        select.innerHTML = '<option value="">Error al cargar ramas</option>';
      }
    }

    async function loadTrack(params) {
      const { team, track, doc, section, mission, branch } = params;
      document.getElementById('nav-track-name').textContent = track;

      // Estructura del track (árbol de carpetas)
      const structure = await api.getTrackStructure(team, track, branch);

      // Determinar qué archivo mostrar
      const activeMission = mission || null;
      const activeDoc = doc || (activeMission
        ? structure.missions.find(m => m.name === activeMission)?.files[0]
        : structure.files[0]);

      renderNavTree(track, structure, activeDoc, activeMission, branch);

      if (activeDoc) {
        const content = await api.getFileContent(team, track, activeDoc, activeMission, branch);
        const { html, sections } = renderer.render(content);
        document.getElementById('doc-body').innerHTML = html;
        await renderer.renderMermaid();
        await sidebar.load(team, track, sections);
        if (section) sidebar.focusSection(section);
      }
    }

    function renderNavTree(track, structure, activeDoc, activeMission, branch) {
      const list = document.getElementById('nav-doc-list');
      list.innerHTML = '';

      const params = router.getParams();

      function makeFileItem(filename, mission) {
        const li = document.createElement('li');
        const isActive = filename === activeDoc && mission === activeMission;
        li.className = isActive ? 'active' : '';
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = filename;
        a.addEventListener('click', e => {
          e.preventDefault();
          const p = new URLSearchParams(location.search);
          p.set('doc', filename);
          if (mission) p.set('mission', mission); else p.delete('mission');
          p.delete('section');
          location.search = p.toString();
        });
        li.appendChild(a);
        return li;
      }

      // Archivos raíz del track
      for (const f of structure.files) {
        list.appendChild(makeFileItem(f, null));
      }

      // Carpetas de misiones
      for (const m of structure.missions) {
        const folder = document.createElement('li');
        folder.className = 'nav-folder';

        const isOpen = m.name === activeMission || (!activeMission && structure.files.length === 0);
        const header = document.createElement('div');
        header.className = `nav-folder-header ${isOpen ? 'open' : ''}`;
        header.innerHTML = `<span class="nav-folder-arrow">${isOpen ? '▾' : '▸'}</span><span class="nav-folder-name">${m.name}</span>`;

        const children = document.createElement('ul');
        children.className = `nav-folder-children ${isOpen ? '' : 'collapsed'}`;
        for (const f of m.files) {
          children.appendChild(makeFileItem(f, m.name));
        }

        header.addEventListener('click', () => {
          const opening = !header.classList.contains('open');
          header.classList.toggle('open', opening);
          header.querySelector('.nav-folder-arrow').textContent = opening ? '▾' : '▸';
          children.classList.toggle('collapsed', !opening);
        });

        folder.appendChild(header);
        folder.appendChild(children);
        list.appendChild(folder);
      }
    }

    boot();
  </script>
</body>
</html>
